<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Absensi Digital Puskesmas Lawawoi</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e2e8f0;
      color: #0f172a;
    }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: auto;
      background: #ffffff;
      padding: 18px;
    }

    .header {
      margin: -18px -18px 20px;
      padding: 24px 18px;
      background: linear-gradient(135deg, #0f766e, #115e59);
      color: white;
      text-align: center;
      border-radius: 0 0 26px 26px;
      box-shadow: 0 8px 20px rgba(15, 118, 110, .25);
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: .3px;
    }

    .header p {
      margin: 7px 0 0;
      font-size: 13px;
      opacity: .92;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .06);
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 13px;
      font-size: 15px;
      background: #ffffff;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 12px;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .btn-main {
      background: #0f766e;
      color: white;
    }

    .btn-main:hover { background: #115e59; }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-light {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #e2e8f0;
    }

    video, canvas, img {
      width: 100%;
      border-radius: 18px;
      background: #020617;
      margin-top: 12px;
      display: block;
    }

    canvas { display: none; }

    .hidden { display: none !important; }

    .status {
      margin-top: 14px;
      padding: 13px;
      border-radius: 13px;
      background: #f8fafc;
      font-size: 14px;
      white-space: pre-line;
      line-height: 1.5;
      border: 1px solid #e2e8f0;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border-color: #bbf7d0;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .warning {
      background: #fef3c7;
      color: #92400e;
      border-color: #fde68a;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }

    .gps-box {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 13px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .row span:first-child { color: #64748b; }
    .row span:last-child { font-weight: 700; text-align: right; }

    .camera-wrap {
      position: relative;
    }

    .face-guide {
      position: absolute;
      width: 170px;
      height: 210px;
      border: 3px dashed rgba(255,255,255,.75);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .small-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>Absensi Digital</h1>
      <p>Puskesmas Lawawoi</p>
    </div>

    <div id="formArea" class="card">
      <h3 class="small-title">Form Absensi</h3>

      <label>Nama Pegawai</label>
      <input id="nama" type="text" placeholder="Masukkan nama lengkap" autocomplete="name" />

      <label>Status Absensi</label>
      <select id="statusAbsen">
        <option value="">-- Pilih Status --</option>
        <option value="Datang">Datang</option>
        <option value="Pulang">Pulang</option>
        <option value="Libur">Libur</option>
        <option value="Dinas Luar">Dinas Luar</option>
        <option value="Dinas Sore">Dinas Sore</option>
        <option value="Dinas Malam">Dinas Malam</option>
      </select>

      <label>Keterangan / Lokasi Tugas</label>
      <textarea id="keterangan" rows="2" placeholder="Opsional, contoh: Posyandu / UGD / Piket malam"></textarea>

      <button class="btn-main" onclick="bukaKamera()">Buka Kamera</button>

      <div class="note">
        Versi asli: tidak memakai foto dummy dan tidak memakai GPS simulasi. Jika kamera atau GPS gagal, absensi tidak dikirim.
      </div>
    </div>

    <div id="cameraArea" class="card hidden">
      <h3 class="small-title">Ambil Foto</h3>
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="face-guide"></div>
      </div>
      <button class="btn-main" onclick="ambilFoto()">Ambil Foto</button>
      <button class="btn-secondary" onclick="tutupKamera()">Kembali</button>
    </div>

    <div id="previewArea" class="card hidden">
      <h3 class="small-title">Pratinjau & GPS</h3>
      <img id="previewFoto" alt="Foto absensi" />
      <canvas id="canvas"></canvas>

      <div class="gps-box">
        <div class="row"><span>Status GPS</span><span id="gpsStatus">Belum diambil</span></div>
        <div class="row"><span>Latitude</span><span id="gpsLat">-</span></div>
        <div class="row"><span>Longitude</span><span id="gpsLng">-</span></div>
        <div class="row"><span>Akurasi</span><span id="gpsAcc">-</span></div>
      </div>

      <button class="btn-light" onclick="ambilGPSManual()">Ambil / Perbarui GPS</button>
      <button id="btnKirim" class="btn-main" onclick="kirimAbsensi()">Kirim Absensi</button>
      <button class="btn-danger" onclick="ambilUlang()">Ambil Ulang Foto</button>
    </div>

    <div id="statusBox" class="status hidden"></div>
  </div>

  <script>
    // GANTI DENGAN LINK WEB APP APPS SCRIPT /exec
    // Contoh: https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxx/exec
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby1H2Klg2I0jdV1uTRdscNoSEDbmWD7FvYGKEpJ-89uuDLez4jw4b6i407vXXI1Sq_f/exec';

    let stream = null;
    let fotoBase64 = null;
    let lokasiTerakhir = null;
    let sedangKirim = false;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const previewFoto = document.getElementById('previewFoto');
    const statusBox = document.getElementById('statusBox');
    const btnKirim = document.getElementById('btnKirim');

    window.onload = function () {
      document.getElementById('nama').value = localStorage.getItem('absen_nama') || '';
    };

    function tampilStatus(pesan, tipe = '') {
      statusBox.className = 'status ' + tipe;
      statusBox.textContent = pesan;
      statusBox.classList.remove('hidden');
    }

    function setGpsUI(lokasi) {
      if (!lokasi) {
        document.getElementById('gpsStatus').textContent = 'Belum diambil';
        document.getElementById('gpsLat').textContent = '-';
        document.getElementById('gpsLng').textContent = '-';
        document.getElementById('gpsAcc').textContent = '-';
        return;
      }

      document.getElementById('gpsStatus').textContent = 'GPS berhasil';
      document.getElementById('gpsLat').textContent = lokasi.latitude;
      document.getElementById('gpsLng').textContent = lokasi.longitude;
      document.getElementById('gpsAcc').textContent = Math.round(lokasi.accuracy) + ' meter';
    }

    function validasiForm() {
      const nama = document.getElementById('nama').value.trim();
      const statusAbsen = document.getElementById('statusAbsen').value;

      if (!nama) {
        alert('Nama pegawai wajib diisi.');
        return false;
      }

      if (!statusAbsen) {
        alert('Status absensi wajib dipilih.');
        return false;
      }

      localStorage.setItem('absen_nama', nama);
      return true;
    }

    async function bukaKamera() {
      if (!validasiForm()) return;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });

        video.srcObject = stream;

        document.getElementById('formArea').classList.add('hidden');
        document.getElementById('cameraArea').classList.remove('hidden');
        document.getElementById('previewArea').classList.add('hidden');
        statusBox.classList.add('hidden');
      } catch (err) {
        tampilStatus('❌ Kamera gagal dibuka.\nPastikan browser mengizinkan kamera dan halaman dibuka melalui HTTPS.', 'error');
      }
    }

    function tutupKamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      document.getElementById('cameraArea').classList.add('hidden');
      document.getElementById('formArea').classList.remove('hidden');
    }

    function ambilFoto() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, w, h);

      fotoBase64 = canvas.toDataURL('image/jpeg', 0.72);
      previewFoto.src = fotoBase64;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      lokasiTerakhir = null;
      setGpsUI(null);

      document.getElementById('cameraArea').classList.add('hidden');
      document.getElementById('previewArea').classList.remove('hidden');
      tampilStatus('Foto berhasil diambil. Silakan ambil GPS lalu kirim absensi.', 'warning');
    }

    function ambilUlang() {
      fotoBase64 = null;
      lokasiTerakhir = null;
      setGpsUI(null);
      document.getElementById('previewArea').classList.add('hidden');
      bukaKamera();
    }

    function ambilGPS() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject('GPS tidak tersedia di perangkat ini.');
          return;
        }

        navigator.geolocation.getCurrentPosition(
          posisi => {
            resolve({
              latitude: posisi.coords.latitude,
              longitude: posisi.coords.longitude,
              accuracy: posisi.coords.accuracy
            });
          },
          error => {
            reject('GPS gagal diambil. Pastikan lokasi/GPS aktif dan izin lokasi diberikan.');
          },
          {
            enableHighAccuracy: true,
            timeout: 20000,
            maximumAge: 0
          }
        );
      });
    }

    async function ambilGPSManual() {
      tampilStatus('Mengambil lokasi GPS...', 'warning');

      try {
        lokasiTerakhir = await ambilGPS();
        setGpsUI(lokasiTerakhir);
        tampilStatus('✅ GPS berhasil diambil. Sekarang absensi bisa dikirim.', 'success');
      } catch (err) {
        lokasiTerakhir = null;
        setGpsUI(null);
        tampilStatus('❌ ' + err, 'error');
      }
    }

    async function kirimAbsensi() {
      if (sedangKirim) return;

      if (WEB_APP_URL === 'PASTE_LINK_WEB_APP_APPS_SCRIPT_EXEC_DI_SINI') {
        tampilStatus('❌ WEB_APP_URL belum diganti dengan link Web App Apps Script /exec.', 'error');
        return;
      }

      if (!validasiForm()) return;

      if (!fotoBase64) {
        tampilStatus('❌ Foto belum diambil.', 'error');
        return;
      }

      try {
        sedangKirim = true;
        btnKirim.disabled = true;

        if (!lokasiTerakhir) {
          tampilStatus('Mengambil lokasi GPS...', 'warning');
          lokasiTerakhir = await ambilGPS();
          setGpsUI(lokasiTerakhir);
        }

        const data = {
          nama: document.getElementById('nama').value.trim(),
          statusAbsen: document.getElementById('statusAbsen').value,
          keterangan: document.getElementById('keterangan').value.trim(),
          fotoBase64: fotoBase64,
          latitude: lokasiTerakhir.latitude,
          longitude: lokasiTerakhir.longitude,
          accuracy: lokasiTerakhir.accuracy,
          userAgent: navigator.userAgent,
          timestampClient: new Date().toISOString()
        };

        tampilStatus('Mengirim absensi ke server...', 'warning');

        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(data)
        });

        // Pada mode no-cors, browser tidak bisa membaca isi response.
        // Jika fetch tidak error, data dianggap sudah dikirim ke Apps Script.
        tampilStatus(
          '✅ Absensi telah dikirim.\n\n' +
          'Status: ' + data.statusAbsen + '\n' +
          'GPS: ' + data.latitude + ', ' + data.longitude,
          'success'
        );

        fotoBase64 = null;
        lokasiTerakhir = null;
        setGpsUI(null);
        document.getElementById('previewArea').classList.add('hidden');
        document.getElementById('formArea').classList.remove('hidden');
        document.getElementById('statusAbsen').value = '';
        document.getElementById('keterangan').value = '';
      } catch (err) {
        tampilStatus('❌ Gagal mengirim absensi.\nPeriksa koneksi internet atau link Web App.', 'error');
      } finally {
        sedangKirim = false;
        btnKirim.disabled = false;
      }
    }
  </script>
</body>
</html>
