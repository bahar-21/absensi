<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="Aplikasi internal absensi pegawai UPT Puskesmas Lawawoi." />
  <meta name="application-name" content="Absensi Lawawoi" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Absensi Lawawoi" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Absensi Digital UPT Puskesmas Lawawoi</title>

  <style>
    /* =========================================================
       ABSENSI DIGITAL PUSKESMAS LAWAWOI
       Versi dasar hasil susun ulang
       - Single HTML
       - Vanilla HTML/CSS/JS
       - Apps Script + Google Sheet
       - Struktur: CONFIG, STATE, STORAGE, API, ENGINE, MEDIA, UI, APP
    ========================================================= */

    /* =========================================================
       1. RESET & DASAR APLIKASI
    ========================================================= */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e2e8f0;
      color: #0f172a;
    }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: auto;
      background: #ffffff;
      padding: 18px;
      padding-bottom: 80px;
    }

    .dev-footer{
  position:fixed;
  right:8px;
  bottom:6px;
  z-index:999;

  background:rgba(255,255,255,.92);
  color:#475569;

  padding:2px 8px;

  font-size:9px;
  font-weight:500;
  letter-spacing:.2px;

  border-radius:6px;

  pointer-events:none;
  user-select:none;
}

    .hidden {
      display: none !important;
    }

    /* =========================================================
       2. HEADER
    ========================================================= */
    .header {
      position: relative;
      margin: -18px -18px 14px;
      padding: 18px 16px 14px;
      background: linear-gradient(135deg, #0f766e, #115e59);
      color: white;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 8px 18px rgba(15, 118, 110, .20);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      line-height: 1.1;
      font-size: 18px;
      letter-spacing: .3px;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 11px;
      opacity: .92;
    }

    .kop-logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      flex-shrink: 0;
      background: transparent !important;
      margin-top: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    /* =========================================================
       3. CARD, FORM, BUTTON
    ========================================================= */
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .06);
      margin-bottom: 14px;
    }

    .small-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 13px;
      font-size: 15px;
      background: #ffffff;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 12px;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .btn-main {
      background: #0f766e;
      color: white;
    }

    .btn-main:hover {
      background: #115e59;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }

    /* =========================================================
       4. STATUS & INFORMASI
    ========================================================= */
    .status {
      position: relative;
      margin-top: 14px;
      padding: 13px;
      border-radius: 13px;
      background: #f8fafc;
      font-size: 14px;
      white-space: pre-line;
      line-height: 1.5;
      border: 1px solid #e2e8f0;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border-color: #bbf7d0;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .warning {
      background: #fef3c7;
      color: #92400e;
      border-color: #fde68a;
    }

    .status-close {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 24px;
      height: 24px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background: rgba(15, 23, 42, .12);
      color: inherit;
      font-size: 14px;
      line-height: 1;
    }

    .label-row {
      display: block;
      margin: 12px 0 6px;
    }

    .label-row label {
      margin: 0;
    }

    /* =========================================================
       5. JAM & TANGGAL
    ========================================================= */
    .time-box {
      position: relative;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #064e3b;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 8px;
      text-align: center;
    }

    .time-box .clock {
      font-family: "Courier New", Consolas, monospace;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1;
      color: #022c22;
    }

    .time-box .date {
      font-size: 12px;
      font-weight: 700;
      margin-top: 3px;
      color: #0f766e;
    }

    /* =========================================================
       5.5 INFO PENGUMUMAN (NEW)
    ========================================================= */
    .info-pengumuman {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 1px solid #7dd3fc;
      color: #0c4a6e;
      border-radius: 14px;
      padding: 11px 13px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 500;
    }

    .info-pengumuman.empty {
      display: none;
    }

    .info-pengumuman-icon {
      display: inline-block;
      margin-right: 6px;
      font-size: 14px;
    }

    /* =========================================================
       6. NAVIGASI CEPAT
    ========================================================= */
    .header-menu-wrap {
      position: relative;
      z-index: 20;
      flex-shrink: 0;
    }

    .header-menu-btn {
      width: 24px;
      height: 24px;
      margin: 0;
      padding: 0;
      border-radius: 8px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      color: #ffffff;
      font-size: 16px;
      line-height: 1;
      backdrop-filter: blur(4px);
    }

    .header-menu-panel {
      position: absolute;
      top: 30px;
      left: 0;
      width: 138px;
      padding: 7px 0;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 12px 24px rgba(15,23,42,.16);
      border: 1px solid #e2e8f0;
      overflow: hidden;
      max-width: calc(100vw - 40px);
    }

    .header-menu-item {
      width: 100%;
      margin: 0;
      padding: 9px 12px;
      border: 0;
      border-radius: 0;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      font-weight: 700;
      text-align: left;
    }

    .header-menu-item:active {
      background: #f1f5f9;
    }

    .danger-menu {
      color: #b91c1c;
    }

    /* =========================================================
       7. REGISTRASI
    ========================================================= */
    .nik-row {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 5px;
      align-items: end;
    }

    .nik-row button {
      margin-top: 0;
      padding: 13px 8px;
      font-size: 14px;
    }

    /* =========================================================
       8. IDENTITAS PEGAWAI
    ========================================================= */
    .network-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .network-badge.offline {
      background: rgba(220, 38, 38, .92);
      border-color: rgba(254, 202, 202, .8);
    }

    .network-badge.online {
      background: rgba(22, 163, 74, .92);
      border-color: rgba(187, 247, 208, .8);
    }

    .network-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .pegawai-header {
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,.14);
    }

    .pegawai-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      position: relative;
      min-width: 0;
    }

    .pegawai-name {
      display: flex;
      justify-content: flex-start;
      align-items: baseline;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pegawai-name-main {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,.96);
    }

    .pegawai-name-sub {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,.82);
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin: 0 0 12px;
      padding: 4px;
      border-radius: 14px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
    }

    .mode-btn {
      margin: 0;
      padding: 8px 6px;
      border-radius: 11px;
      background: transparent;
      color: #475569;
      border: 0;
      font-size: 12px;
      font-weight: 800;
    }

    .mode-btn.active {
      background: #0f766e;
      color: #ffffff;
      box-shadow: none;
    }

    .absen-summary {
      background: #ecfdf5;
      border: 1px solid #99f6e4;
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 14px;
      color: #134e4a;
    }

    .absen-summary .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #0f766e;
      color: white;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .3px;
      margin-bottom: 8px;
    }

    .absen-summary .title {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .absen-summary .text {
      font-size: 13px;
      line-height: 1.55;
      color: #334155;
      white-space: pre-line;
    }

    .absen-summary .spirit {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 800;
      color: #047857;
    }

    /* =========================================================
       9. KAMERA, FOTO, GPS
    ========================================================= */
    video,
    canvas,
    img {
      width: 100%;
      border-radius: 18px;
      background: #020617;
      margin-top: 12px;
      display: block;
    }

    #cameraArea {
      padding-top: 8px;
    }

    #cameraArea .time-box {
      margin-bottom: 6px;
    }

    #cameraArea .small-title {
      margin-bottom: 6px;
    }

    #video {
      height: 58vh;
      max-height: 430px;
      min-height: 330px;
      object-fit: cover;
      object-position: center top;
      margin-top: 8px;
transform: scaleX(-1);
}

    #previewFoto {
      width: 112px;
      height: 112px;
      margin: 10px auto 8px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center center;
      border: 4px solid #ffffff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .16);
      background: #020617;
    }

    canvas {
      display: none;
    }

    .camera-wrap,
    .photo-box,
    .gps-box {
      position: relative;
    }

    .face-guide {
      position: absolute;
      width: 176px;
      height: 218px;
      border: 3px dashed rgba(255,255,255,.75);
      border-radius: 50%;
      top: 43%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .mini-action,
    .gps-refresh {
      position: absolute;
      width: 42px;
      height: 42px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      color: white;
      font-weight: 900;
      z-index: 5;
    }

    .mini-action {
      top: 50%;
      right: calc(50% - 72px);
      background: rgba(15, 23, 42, .78);
      font-size: 20px;
      box-shadow: 0 6px 14px rgba(0,0,0,.25);
    }

    .gps-refresh {
      top: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      background: #0f766e;
      font-size: 16px;
    }

    .gps-box {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 13px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .row span:first-child {
      color: #64748b;
    }

    .row span:last-child {
      font-weight: 700;
      text-align: right;
    }

    /* =========================================================
       10. RIWAYAT
    ========================================================= */
    .riwayat-list {
      display: grid;
      gap: 10px;
    }

    .riwayat-card {
      background: #ecfdf5;
      border: 1px solid #99f6e4;
      border-radius: 18px;
      padding: 13px;
      color: #134e4a;
    }

    .riwayat-card .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #0f766e;
      color: white;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .3px;
      margin-bottom: 7px;
    }

    .riwayat-card .title {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .riwayat-card .text {
      font-size: 13px;
      line-height: 1.55;
      color: #334155;
      white-space: pre-line;
    }

    /* =========================================================
       11. ADMIN
    ========================================================= */
    .admin-page {
      padding-top: 2px;
    }

    .admin-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .admin-back-btn,
    .admin-copy-btn {
      width: 38px;
      height: 38px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background: #e2e8f0;
      color: #0f172a;
      font-size: 18px;
    }

    .admin-copy-btn {
      background: #dcfce7;
      color: #166534;
      font-size: 17px;
    }

    .admin-date-filter {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: -4px 0 12px;
      padding: 8px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .admin-date-filter input {
      padding: 9px 10px;
      border-radius: 11px;
      font-size: 13px;
    }

    .admin-date-filter button {
      width: 42px;
      height: 38px;
      padding: 0;
      margin: 0;
      border-radius: 11px;
      font-size: 16px;
      flex-shrink: 0;
    }

    .admin-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
    }

    .copy-toast {
      position: absolute;
      top: 44px;
      right: 44px;
      background: #166534;
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(0,0,0,.16);
      white-space: nowrap;
      animation: fadeCopy .18s ease;
    }

    @keyframes fadeCopy {
      from {
        opacity: 0;
        transform: translateY(-2px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .admin-rekap-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin: 0 0 14px;
    }

    .admin-rekap-chip {
      border-radius: 12px;
      padding: 7px 3px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      text-align: center;
      cursor: pointer;
      min-width: 0;
      transition: .15s ease;
    }

    .admin-rekap-chip.active {
      background: #0f766e;
      border-color: #0f766e;
      box-shadow: 0 8px 16px rgba(15,118,110,.18);
    }

    .admin-rekap-chip.active .angka,
    .admin-rekap-chip.active .label {
      color: #ffffff;
    }

    .admin-rekap-chip .angka {
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      color: #0f172a;
    }

    .admin-rekap-chip .label {
      margin-top: 3px;
      font-size: 9px;
      font-weight: 800;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-mini-panel {
      margin-top: 8px;
      padding: 11px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 18px rgba(15,23,42,.08);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
    }

    .admin-mini-title {
      font-size: 12px;
      font-weight: 900;
      color: #0f766e;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    /* =========================================================
       12. REKAP BULANAN ADMIN
    ========================================================= */
    .admin-section-tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:5px;
      margin:0 0 12px;
      padding:4px;
      border-radius:14px;
      background:#f1f5f9;
      border:1px solid #e2e8f0;
    }

    .admin-tab-btn{
      margin:0;
      padding:9px 8px;
      border-radius:11px;
      background:transparent;
      color:#475569;
      font-size:12px;
      font-weight:900;
    }

    .admin-tab-btn.active{
      background:#0f766e;
      color:#ffffff;
    }

    .monthly-filter{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:10px;
      border-radius:16px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      margin-bottom:10px;
    }

    .monthly-filter .full{
      grid-column:1 / -1;
    }

    .monthly-filter label{
      margin:0 0 5px;
      font-size:11px;
    }

    .monthly-filter select,
    .monthly-filter input{
      padding:10px;
      border-radius:12px;
      font-size:13px;
    }

    .monthly-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:10px;
    }

    .monthly-actions button{
      margin-top:0;
      padding:11px 8px;
      font-size:12px;
    }

    .table-wrap{
      overflow-x:auto;
      border:1px solid #e2e8f0;
      border-radius:14px;
      background:#ffffff;
    }

    .rekap-table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      min-width:720px;
    }

    .rekap-table th,
    .rekap-table td{
      padding:8px 9px;
      border-bottom:1px solid #e2e8f0;
      text-align:left;
      white-space:nowrap;
    }

    .rekap-table th{
      position:sticky;
      top:0;
      background:#ecfdf5;
      color:#0f766e;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.3px;
      z-index:1;
    }

    .rekap-table td.num,
    .rekap-table th.num{
      text-align:center;
    }

    .rekap-table tbody tr:nth-child(even){
      background:#f8fafc;
    }

    .monthly-note{
      margin:8px 0 0;
      font-size:11px;
      color:#64748b;
      line-height:1.45;
    }

.jam-kerja-info{
  margin-top:24px;
  padding-top:10px;

  border-top:1px solid #e2e8f0;

  font-size:11px;
  color:#64748b;
}

.jam-kerja-title{
  font-size:11px;
  font-weight:700;
  color:#475569;
  margin-bottom:6px;
}

.jam-kerja-row{
  display:flex;
  justify-content:space-between;
  gap:12px;

  padding:2px 0;
  line-height:1.4;
}
  </style>
</head>

<body>
  <div class="app" id="app">
    <!-- =====================================================
      HEADER
    ====================================================== -->
    <header class="header"><div class="header-inner">
        <img
          class="kop-logo"
          src="https://upload.wikimedia.org/wikipedia/commons/b/b7/Official_Logo_of_Sidenreng_Rappang_Regency.png"
          onerror="this.style.display='none'"
          alt="Logo Sidrap"
        />
        <div>
          <h1>Absensi Digital Pegawai</h1>
          <p>Aplikasi Internal UPT Puskesmas Lawawoi</p>
        </div>
      </div>

      <div class="header-menu-wrap">
        <button class="header-menu-btn" id="headerMenuBtn">⚙️</button>
        <div class="header-menu-panel hidden" id="headerMenuPanel">
          <button class="header-menu-item" id="adminBtn">Admin</button>
          <button class="header-menu-item danger-menu" id="logoutBtn">Logout</button>
        </div>
      </div>
    </header>

    <!-- =====================================================
      MAIN CONTENT - USER PAGE
    ====================================================== -->
    <div id="userPage">
      <div class="time-box">
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="date">-</div>
      </div>

      <!-- INFO PENGUMUMAN (ANNOUNCEMENT) -->
      <div class="info-pengumuman empty" id="infoPengumuman">
        <span class="info-pengumuman-icon">📢</span>
        <span id="infoPengumumanText"></span>
      </div>

      <div class="card" id="mainCard">
        <!-- Content akan diisi oleh JavaScript -->
      </div>
    </div>

    <!-- =====================================================
      ADMIN PAGE
    ====================================================== -->
    <div id="adminPage" class="hidden admin-page">
      <div class="admin-header-row">
        <button class="admin-back-btn" id="adminBackBtn">←</button>
        <div style="text-align: center; flex: 1;">
          <h2 style="margin: 0; font-size: 16px; font-weight: 900;">Panel Admin</h2>
        </div>
        <div style="width: 38px;"></div>
      </div>

      <!-- SECTION: EDIT PENGUMUMAN -->
      <div class="card">
        <div class="small-title">📢 Kelola Pengumuman</div>
        
        <label for="inputPengumuman">Teks Pengumuman (Maks 100 karakter):</label>
        <textarea 
          id="inputPengumuman" 
          maxlength="100" 
          rows="3"
          placeholder="Contoh: Lokmin Bulanan 09 Juni 2026 pukul 10:00 di Aula"
          style="resize: none;"
        ></textarea>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: #64748b;">
          <span id="charCount">0/100</span>
          <button class="btn-main" id="savePengumumanBtn" style="width: auto; padding: 8px 16px; margin-top: 0;">Simpan</button>
        </div>
      </div>

      <!-- STATUS MESSAGE -->
      <div id="adminStatus" class="status hidden" style="margin-top: 12px;"></div>
    </div>

  </div>

  <script>
    // =========================================================================
    // KONFIGURASI & PENYIMPANAN
    // =========================================================================
    
    const STORAGE_KEY = 'absensi_pengumuman';
    
    // Fungsi untuk menyimpan dan mengambil pengumuman dari localStorage
    const PengumumanStorage = {
      set: (text) => {
        localStorage.setItem(STORAGE_KEY, text);
      },
      get: () => {
        return localStorage.getItem(STORAGE_KEY) || '';
      }
    };

    // =========================================================================
    // INISIAL RENDER PENGUMUMAN
    // =========================================================================
    
    function initPengumuman() {
      const pengumuman = PengumumanStorage.get();
      updatePengumumanDisplay(pengumuman);
      document.getElementById('inputPengumuman').value = pengumuman;
      updateCharCount();
    }

    function updatePengumumanDisplay(text) {
      const container = document.getElementById('infoPengumuman');
      const textElement = document.getElementById('infoPengumumanText');
      
      if (text.trim()) {
        container.classList.remove('empty');
        textElement.textContent = text;
      } else {
        container.classList.add('empty');
        textElement.textContent = '';
      }
    }

    // =========================================================================
    // PANEL ADMIN - EVENT LISTENERS
    // =========================================================================
    
    document.getElementById('headerMenuBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      const panel = document.getElementById('headerMenuPanel');
      panel.classList.toggle('hidden');
    });

    document.getElementById('adminBtn').addEventListener('click', () => {
      document.getElementById('userPage').classList.add('hidden');
      document.getElementById('adminPage').classList.remove('hidden');
      document.getElementById('headerMenuPanel').classList.add('hidden');
      initPengumuman();
    });

    document.getElementById('adminBackBtn').addEventListener('click', () => {
      document.getElementById('adminPage').classList.add('hidden');
      document.getElementById('userPage').classList.remove('hidden');
    });

    // Update character count
    document.getElementById('inputPengumuman').addEventListener('input', updateCharCount);

    function updateCharCount() {
      const input = document.getElementById('inputPengumuman');
      const count = input.value.length;
      document.getElementById('charCount').textContent = `${count}/100`;
    }

    // Save pengumuman
    document.getElementById('savePengumumanBtn').addEventListener('click', () => {
      const text = document.getElementById('inputPengumuman').value.trim();
      PengumumanStorage.set(text);
      updatePengumumanDisplay(text);
      
      // Show success message
      const statusEl = document.getElementById('adminStatus');
      statusEl.textContent = '✓ Pengumuman berhasil disimpan';
      statusEl.classList.remove('hidden', 'error');
      statusEl.classList.add('success');
      
      setTimeout(() => {
        statusEl.classList.add('hidden');
      }, 3000);
    });

    // Close menu when clicking outside
    document.addEventListener('click', () => {
      document.getElementById('headerMenuPanel').classList.add('hidden');
    });

    // =========================================================================
    // JAM & TANGGAL
    // =========================================================================
    
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
      
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = now.toLocaleDateString('id-ID', options);
      document.getElementById('date').textContent = dateStr;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // =========================================================================
    // INISIAL LOAD
    // =========================================================================
    
    document.addEventListener('DOMContentLoaded', () => {
      initPengumuman();
    });

    // Jika sudah loaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPengumuman);
    } else {
      initPengumuman();
    }
  </script>
</body>
</html>
